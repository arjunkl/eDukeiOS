name: Staged Ion Fury voxel source patch

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  staged-script-container:
    runs-on: ubuntu-latest
    steps:
      - name: Stored source patch
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one replacement target, found {count}")
              file.write_text(text.replace(old, new, 1))

          controls = "platform/Apple/iOS/EDuke32Controls.mm"
          replace_once(
              controls,
              "static BOOL g_usePolymost = NO;\n",
              "static BOOL g_usePolymost = NO;\n"
              "static NSInteger g_furyVoxelPackMode = 0;\n"
              "static char g_furyVoxelPackSearchPath[BMAX_PATH] = {};\n",
          )

          replace_once(
              controls,
              "- (instancetype)initWithCompletion:(EDuke32LaunchCompletion)completion;\n"
              "- (void)showArjukStudiosSplashWithCompletion:(dispatch_block_t)completion;\n",
              "- (instancetype)initWithCompletion:(EDuke32LaunchCompletion)completion;\n"
              "- (NSInteger)detectFuryVoxelPack;\n"
              "- (void)showArjukStudiosSplashWithCompletion:(dispatch_block_t)completion;\n",
          )

          replace_once(
              controls,
              '''- (NSString *)fileNamed:(NSString *)wanted
          {
              NSArray *files = [[NSFileManager defaultManager] contentsOfDirectoryAtPath:_documentsPath error:nil];
              for (NSString *file in files)
                  if ([file caseInsensitiveCompare:wanted] == NSOrderedSame)
                      return file;
              return nil;
          }

          - (UIButton *)gameButtonWithTitle:(NSString *)title
          ''',
              '''- (NSString *)fileNamed:(NSString *)wanted
          {
              NSArray *files = [[NSFileManager defaultManager] contentsOfDirectoryAtPath:_documentsPath error:nil];
              for (NSString *file in files)
                  if ([file caseInsensitiveCompare:wanted] == NSOrderedSame)
                      return file;
              return nil;
          }

          - (NSInteger)detectFuryVoxelPack
          {
              NSFileManager *manager = NSFileManager.defaultManager;
              g_furyVoxelPackMode = 0;
              g_furyVoxelPackSearchPath[0] = '\\0';

              NSString *rootDef = [_documentsPath stringByAppendingPathComponent:@"voxels.def"];
              NSString *rootKVX = [_documentsPath stringByAppendingPathComponent:@"KVX"];
              BOOL isDirectory = NO;
              BOOL const rootDefExists = [manager fileExistsAtPath:rootDef isDirectory:&isDirectory] && !isDirectory;
              isDirectory = NO;
              BOOL const rootKVXExists = [manager fileExistsAtPath:rootKVX isDirectory:&isDirectory] && isDirectory;
              if (rootDefExists && rootKVXExists)
              {
                  NSString *maphacks = [_documentsPath stringByAppendingPathComponent:@"maphacks"];
                  isDirectory = NO;
                  BOOL const hasMaphacks = [manager fileExistsAtPath:maphacks isDirectory:&isDirectory] && isDirectory;
                  g_furyVoxelPackMode = 1;
                  fprintf(stderr, "EDUKE32_IOS_VOXELS: flattened detected; module=voxels.def maphacks=%s\\n",
                          hasMaphacks ? "present" : "missing");
                  fflush(stderr);
                  return g_furyVoxelPackMode;
              }

              NSArray<NSString *> *entries = [manager contentsOfDirectoryAtPath:_documentsPath error:nil];
              for (NSString *entry in entries)
              {
                  if ([entry rangeOfString:@"IonFury-Voxel-Pack"
                                   options:(NSCaseInsensitiveSearch | NSAnchoredSearch)].location == NSNotFound)
                      continue;

                  NSString *base = [_documentsPath stringByAppendingPathComponent:entry];
                  NSString *nestedDef = [base stringByAppendingPathComponent:@"voxels.def"];
                  NSString *nestedKVX = [base stringByAppendingPathComponent:@"KVX"];
                  isDirectory = NO;
                  BOOL const nestedDefExists = [manager fileExistsAtPath:nestedDef isDirectory:&isDirectory] && !isDirectory;
                  isDirectory = NO;
                  BOOL const nestedKVXExists = [manager fileExistsAtPath:nestedKVX isDirectory:&isDirectory] && isDirectory;
                  if (!nestedDefExists || !nestedKVXExists)
                      continue;

                  NSString *maphacks = [base stringByAppendingPathComponent:@"maphacks"];
                  isDirectory = NO;
                  BOOL const hasMaphacks = [manager fileExistsAtPath:maphacks isDirectory:&isDirectory] && isDirectory;
                  g_furyVoxelPackMode = 2;
                  Bstrncpyz(g_furyVoxelPackSearchPath, entry.fileSystemRepresentation,
                            sizeof(g_furyVoxelPackSearchPath));
                  fprintf(stderr,
                          "EDUKE32_IOS_VOXELS: nested detected; search=%s module=voxels.def maphacks=%s\\n",
                          g_furyVoxelPackSearchPath, hasMaphacks ? "present" : "missing");
                  fflush(stderr);
                  return g_furyVoxelPackMode;
              }

              fprintf(stderr, "EDUKE32_IOS_VOXELS: disabled/not found\\n");
              fflush(stderr);
              return 0;
          }

          - (UIButton *)gameButtonWithTitle:(NSString *)title
          ''',
          )

          replace_once(
              controls,
              '''    UIStackView *cards = [[[UIStackView alloc] initWithArrangedSubviews:@[
                  [self gameButtonWithTitle:@"Duke Nukem 3D"
                                   subtitle:@"DUKE3D.GRP" tag:1 enabled:YES],
                  [self gameButtonWithTitle:@"Ion Fury"
                                   subtitle:@"FURY.GRP · base game or Aftershock" tag:2 enabled:YES],
          ''',
              '''    NSInteger const voxelPackMode = [self detectFuryVoxelPack];
              NSString *furySubtitle = voxelPackMode
                  ? @"FURY.GRP · voxel pack detected"
                  : @"FURY.GRP · base game or Aftershock";

              UIStackView *cards = [[[UIStackView alloc] initWithArrangedSubviews:@[
                  [self gameButtonWithTitle:@"Duke Nukem 3D"
                                   subtitle:@"DUKE3D.GRP" tag:1 enabled:YES],
                  [self gameButtonWithTitle:@"Ion Fury"
                                   subtitle:furySubtitle tag:2 enabled:YES],
          ''',
          )

          replace_once(
              controls,
              '''    if (sender.tag == 2 && ![self writeFuryMetadataForFile:file])
                  return;

              g_usePolymost = sender.tag == 2;
          ''',
              '''    if (sender.tag == 2)
                  [self detectFuryVoxelPack];
              else
              {
                  g_furyVoxelPackMode = 0;
                  g_furyVoxelPackSearchPath[0] = '\\0';
              }

              if (sender.tag == 2 && ![self writeFuryMetadataForFile:file])
                  return;

              g_usePolymost = sender.tag == 2;
          ''',
          )

          replace_once(
              controls,
              '''extern "C" int EDuke32_IOS_WantsPolymost(void)
          {
              return g_usePolymost ? 1 : 0;
          }

          extern "C" char *EDuke32_IOS_SelectGame(void)
          ''',
              '''extern "C" int EDuke32_IOS_WantsPolymost(void)
          {
              return g_usePolymost ? 1 : 0;
          }

          extern "C" int EDuke32_IOS_FuryVoxelPackMode(void)
          {
              return (int)g_furyVoxelPackMode;
          }

          extern "C" char const *EDuke32_IOS_FuryVoxelPackSearchPath(void)
          {
              return g_furyVoxelPackSearchPath[0] ? g_furyVoxelPackSearchPath : nullptr;
          }

          extern "C" char *EDuke32_IOS_SelectGame(void)
          ''',
          )

          sdlayer = "source/build/src/sdlayer.cpp"
          replace_once(
              sdlayer,
              '''extern "C" char *EDuke32_IOS_SelectGame(void);
          extern "C" int EDuke32_IOS_WantsPolymost(void);
          ''',
              '''extern "C" char *EDuke32_IOS_SelectGame(void);
          extern "C" int EDuke32_IOS_WantsPolymost(void);
          extern "C" int EDuke32_IOS_FuryVoxelPackMode(void);
          extern "C" char const *EDuke32_IOS_FuryVoxelPackSearchPath(void);
          ''',
          )

          replace_once(
              sdlayer,
              '''    char *iosSelectedGrp = EDuke32_IOS_SelectGame();
              char *iosArgv[4] = { argv[0], (char *)"-gamegrp", iosSelectedGrp, nullptr };
              if (iosSelectedGrp != nullptr)
              {
                  argc = 3;
                  argv = iosArgv;
              }
          ''',
              '''    char *iosSelectedGrp = EDuke32_IOS_SelectGame();
              char *iosArgv[8] = { argv[0], (char *)"-gamegrp", iosSelectedGrp,
                                   nullptr, nullptr, nullptr, nullptr, nullptr };
              if (iosSelectedGrp != nullptr)
              {
                  argc = 3;
                  int const iosVoxelPackMode = EDuke32_IOS_WantsPolymost()
                      ? EDuke32_IOS_FuryVoxelPackMode() : 0;
                  if (iosVoxelPackMode == 1)
                  {
                      iosArgv[3] = (char *)"-mh";
                      iosArgv[4] = (char *)"voxels.def";
                      argc = 5;
                      fprintf(stderr,
                              "EDUKE32_IOS_VOXELS: enabled flattened; module=voxels.def\\n");
                  }
                  else if (iosVoxelPackMode == 2)
                  {
                      char const *searchPath = EDuke32_IOS_FuryVoxelPackSearchPath();
                      if (searchPath && searchPath[0])
                      {
                          iosArgv[3] = (char *)"-j";
                          iosArgv[4] = const_cast<char *>(searchPath);
                          iosArgv[5] = (char *)"-mh";
                          iosArgv[6] = (char *)"voxels.def";
                          argc = 7;
                          fprintf(stderr,
                                  "EDUKE32_IOS_VOXELS: enabled nested; search=%s module=voxels.def\\n",
                                  searchPath);
                      }
                      else
                          fprintf(stderr,
                                  "EDUKE32_IOS_VOXELS: nested mode missing search path; disabled\\n");
                  }
                  else if (EDuke32_IOS_WantsPolymost())
                      fprintf(stderr,
                              "EDUKE32_IOS_VOXELS: disabled/not found; using base game definitions\\n");
                  fflush(stderr);
                  argv = iosArgv;
              }
          ''',
          )

          readme = "README.md"
          replace_once(
              readme,
              '''Ion Fury still requires device testing and may need compatibility fixes for particular retail or expansion versions.

          ### Shadow Warrior
          ''',
              '''Ion Fury still requires device testing and may need compatibility fixes for particular retail or expansion versions.

          #### Optional Ion Fury / Aftershock voxel pack

          eDukeiOS automatically detects the community [Ion Fury Voxel Pack](https://github.com/Dzierzan/IonFury-Voxel-Pack) when Ion Fury or Aftershock is selected. The pack is loaded as an additional DEF module, leaving the original `fury.def` or `ashock.def` root definitions unchanged.

          In `On My iPhone → eDukeiOS`, use either layout:

          - Copy `voxels.def`, `KVX`, and optionally `maphacks` directly into the eDukeiOS folder; or
          - Copy the downloaded folder intact. Folder names beginning with `IonFury-Voxel-Pack`, including GitHub's `IonFury-Voxel-Pack-main`, are recognized.

          `voxels.def` and the `KVX` directory are required. The launcher displays **voxel pack detected** when the layout is valid. The `maphacks` directory is recommended but optional.

          The voxel artwork is not distributed with eDukeiOS. It has a separate noncommercial, attribution-required Voxel Pack Art License and may only be used with a legally acquired copy of Ion Fury. Review the pack's `voxelpack_art_license.txt` before installing it.

          ### Shadow Warrior
          ''',
          )

          replace_once(
              readme,
              '''- Any legally owned accompanying loose files required by your edition

          For the separate VoidSW diagnostic app, use:
          ''',
              '''- Any legally owned accompanying loose files required by your edition
          - Optional voxel pack files as described in the Ion Fury section above

          For the separate VoidSW diagnostic app, use:
          ''',
          )

          replace_once(
              readme,
              '''eDukeiOS is based on EDuke32 and retains its open-source licensing and attribution requirements. See the license files and source headers in this repository for the complete terms.

          Duke Nukem 3D, Ion Fury, Shadow Warrior, their game data, names, artwork, music, and other proprietary assets belong to their respective owners. This repository distributes source-port code only and does not grant rights to commercial game data.
          ''',
              '''eDukeiOS is based on EDuke32 and retains its open-source licensing and attribution requirements. See the license files and source headers in this repository for the complete terms.

          Optional Ion Fury voxel artwork is created by the contributors to [Dzierzan/IonFury-Voxel-Pack](https://github.com/Dzierzan/IonFury-Voxel-Pack) and remains governed by that project's separate Voxel Pack Art License. It is not included in this repository or its IPA artifacts.

          Duke Nukem 3D, Ion Fury, Shadow Warrior, their game data, names, artwork, music, and other proprietary assets belong to their respective owners. This repository distributes source-port code only and does not grant rights to commercial game data.
          ''',
          )
          PY
