name: iOS build probe

on:
  pull_request:
    paths:
      - ".github/workflows/ios-build.yml"
      - "platform/Apple/**"
      - "source/**"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  legacy-ios-target:
    name: Legacy EDuke32-iOS target
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Check out eDukeiOS
        uses: actions/checkout@v6
        with:
          ref: ios-polymost-gl4es
          fetch-depth: 1
          show-progress: false

      # BEGIN ONE-SHOT ION FURY VOXEL APPLICATOR
      - name: Apply staged Ion Fury voxel integration
        if: ${{ hashFiles('.github/workflows/apply-ion-fury-voxels.yml') != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          exec > >(tee voxel-apply.log) 2>&1
          set -euo pipefail
          python3 - <<'PY'
          import os
          from pathlib import Path

          staged = Path(".github/workflows/apply-ion-fury-voxels.yml").read_text()
          start_marker = "          python3 - <<'PY'\n"
          end_marker = "\n          PY\n"
          if start_marker not in staged or end_marker not in staged.split(start_marker, 1)[1]:
              raise SystemExit("staged voxel patch markers are missing")
          block = staged.split(start_marker, 1)[1].split(end_marker, 1)[0]
          script = "\n".join(
              line[10:] if line.startswith("          ") else line
              for line in block.splitlines()
          ) + "\n"
          output = Path(os.environ["RUNNER_TEMP"]) / "apply-ion-fury-voxels.py"
          output.write_text(script)
          print(f"Extracted staged patch to {output}")
          PY

          python3 "$RUNNER_TEMP/apply-ion-fury-voxels.py"
          rm .github/workflows/apply-ion-fury-voxels.yml

          python3 - <<'PY'
          from pathlib import Path

          path = Path(".github/workflows/ios-build.yml")
          text = path.read_text()
          begin = "      # BEGIN ONE-SHOT ION FURY VOXEL APPLICATOR\n"
          end = "      # END ONE-SHOT ION FURY VOXEL APPLICATOR\n"
          start = text.find(begin)
          finish = text.find(end)
          if start < 0 or finish < 0 or finish < start:
              raise SystemExit("one-shot workflow markers are missing")
          finish += len(end)
          text = text[:start] + text[finish:]
          text = text.replace(
              "permissions:\n  contents: write\n  actions: write\n",
              "permissions:\n  contents: read\n",
              1,
          )
          text = text.replace(
              "      - name: Check out eDukeiOS\n"
              "        uses: actions/checkout@v6\n"
              "        with:\n"
              "          ref: ios-polymost-gl4es\n"
              "          fetch-depth: 1\n"
              "          show-progress: false\n",
              "      - name: Check out eDukeiOS\n"
              "        uses: actions/checkout@v6\n",
              1,
          )
          path.write_text(text)
          PY

          git diff --check
          git config user.name "eDukeiOS Build Agent"
          git config user.email "actions@users.noreply.github.com"
          git add platform/Apple/iOS/EDuke32Controls.mm \
                  source/build/src/sdlayer.cpp \
                  README.md \
                  .github/workflows/ios-build.yml \
                  .github/workflows/apply-ion-fury-voxels.yml
          git commit -m "Add optional Ion Fury voxel pack loading"
          git push origin HEAD:ios-polymost-gl4es

          sleep 3
          curl --fail-with-body -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/ios-build.yml/dispatches" \
            -d '{"ref":"ios-polymost-gl4es"}'

      - name: Upload voxel applicator diagnostics
        if: always() && hashFiles('voxel-apply.log') != ''
        uses: actions/upload-artifact@v4
        with:
          name: voxel-applicator-log
          path: voxel-apply.log
          if-no-files-found: error
          retention-days: 3
      # END ONE-SHOT ION FURY VOXEL APPLICATOR

      - name: Generate iOS app icon assets
        run: |
          set -e
          iconset="platform/Apple/iOS/Images.xcassets/AppIcon.appiconset"
          source="$RUNNER_TEMP/eDukeiOS-AppIcon.jpg"
          /usr/bin/base64 -D -i platform/Apple/iOS/AppIcon1024.jpg.base64 -o "$source"

          while read -r name size; do
            /usr/bin/sips -s format png -z "$size" "$size" "$source" \
              --out "$iconset/$name.png" >/dev/null
          done <<'ICON_SIZES'
          iphone-20@2x 40
          iphone-20@3x 60
          iphone-29@2x 58
          iphone-29@3x 87
          iphone-40@2x 80
          iphone-40@3x 120
          iphone-60@2x 120
          iphone-60@3x 180
          ipad-20@1x 20
          ipad-20@2x 40
          ipad-29@1x 29
          ipad-29@2x 58
          ipad-40@1x 40
          ipad-40@2x 80
          ipad-76@1x 76
          ipad-76@2x 152
          ipad-83.5@2x 167
          ios-marketing 1024
          ICON_SIZES

      - name: Fetch SDL2 beside the repository
        run: git clone --depth 1 --branch SDL2 https://github.com/libsdl-org/SDL.git ../SDL

      - name: Build GL4ES for Polymost on iOS
        run: |
          set -euxo pipefail
          git clone --depth 1 --branch v1.1.6 https://github.com/ptitSeb/gl4es.git ../gl4es
          git clone --depth 1 https://github.com/leetal/ios-cmake.git ../ios-cmake
          git -C ../gl4es apply "$GITHUB_WORKSPACE/platform/Apple/iOS/gl4es-darwin.patch"
          cmake \
            -S ../gl4es \
            -B ../gl4es/build-ios \
            -G Xcode \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/../ios-cmake/ios.toolchain.cmake" \
            -DPLATFORM=OS64 \
            -DDEPLOYMENT_TARGET=15.0 \
            -DNOX11=ON \
            -DNOEGL=ON \
            -DSTATICLIB=ON \
            -DDEFAULT_ES=2 \
            -DNO_INIT_CONSTRUCTOR=ON
          cmake --build ../gl4es/build-ios --config Release --target GL
          GL4ES_LIBRARY="../gl4es/lib/Release/libGL.a"
          test -f "$GL4ES_LIBRARY"
          mkdir -p ../gl4es/install/lib
          cp "$GL4ES_LIBRARY" ../gl4es/install/lib/libGL.a

      - name: Configure generated VoidSW iOS target
        run: |
          if ! ruby -e 'require "xcodeproj"' 2>/dev/null; then
            gem install xcodeproj --no-document
          fi
          ruby platform/Apple/iOS/configure_voidsw_target.rb

      - name: Record Apple toolchain
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version
          xcrun --sdk iphoneos --show-sdk-path
          uname -m

      - name: List Xcode targets
        run: |
          xcodebuild -list -project platform/Apple/EDuke32.xcodeproj
          xcodebuild -list -project ../SDL/Xcode/SDL/SDL.xcodeproj

      - name: Build unsigned arm64 dependencies and app
        run: |
          set -o pipefail

          common_settings=(
            -configuration Debug
            -sdk iphoneos
            ARCHS=arm64
            ONLY_ACTIVE_ARCH=NO
            IPHONEOS_DEPLOYMENT_TARGET=15.0
            CODE_SIGNING_ALLOWED=NO
            CODE_SIGNING_REQUIRED=NO
            COMPILER_INDEX_STORE_ENABLE=NO
            DEBUG_INFORMATION_FORMAT=dwarf-with-dsym
            COPY_PHASE_STRIP=NO
            STRIP_INSTALLED_PRODUCT=NO
            SYMROOT="$GITHUB_WORKSPACE/platform/Apple/build"
            HEADER_SEARCH_PATHS="$GITHUB_WORKSPACE/platform/Apple/iOS/gl4es-shim \$(inherited) $GITHUB_WORKSPACE/../gl4es/include"
            LIBRARY_SEARCH_PATHS="\$(inherited) $GITHUB_WORKSPACE/../gl4es/install/lib"
            OTHER_LDFLAGS="\$(inherited) -lGL"
            GCC_PREPROCESSOR_DEFINITIONS="\$(inherited) EDUKE32_GL4ES=1 HAVE_VORBIS=1"
            EXCLUDED_SOURCE_FILE_NAMES=glad.c
          )

          xcodebuild \
            -project ../SDL/Xcode/SDL/SDL.xcodeproj \
            -target "Static Library-iOS" \
            "${common_settings[@]}" \
            build 2>&1 | tee ios-build.log

          for target in BUILD-iOS MACT-iOS AudioLib-iOS EDuke32-iOS VoidSW-iOS; do
            xcodebuild \
              -project platform/Apple/EDuke32.xcodeproj \
              -target "$target" \
              "${common_settings[@]}" \
              build 2>&1 | tee -a ios-build.log
          done

          APP_BINARY="platform/Apple/build/Debug-iphoneos/EDuke32-iOS.app/EDuke32-iOS"
          test -x "$APP_BINARY"
          if strings "$APP_BINARY" | grep -Fq "OggVorbis support not included in this binary"; then
            echo "Ion Fury requires Vorbis, but the iOS binary contains the no-Vorbis stub." >&2
            exit 1
          fi
          if ! strings "$APP_BINARY" | grep -Fq "EDUKE32_IOS_VOXELS:"; then
            echo "The iOS binary is missing the optional Ion Fury voxel loader diagnostics." >&2
            exit 1
          fi
          python3 - <<'PY'
          from pathlib import Path

          source = Path("source/build/src/sdlayer.cpp").read_text()
          assert "int const iosVoxelPackMode = EDuke32_IOS_WantsPolymost()" in source
          assert "? EDuke32_IOS_FuryVoxelPackMode() : 0;" in source
          assert 'iosArgv[3] = (char *)"-mh"' in source
          assert 'iosArgv[3] = (char *)"-j"' in source
          assert "argc = 3;" in source
          PY

      - name: Package unsigned IPA
        run: |
          cp platform/Apple/iOS/ArjukStudios.jpeg \
            platform/Apple/build/Debug-iphoneos/EDuke32-iOS.app/ArjukStudios.jpeg
          test -f platform/Apple/build/Debug-iphoneos/EDuke32-iOS.app/ArjukStudios.jpeg
          mkdir Payload
          cp -R platform/Apple/build/Debug-iphoneos/EDuke32-iOS.app Payload/
          test -x Payload/EDuke32-iOS.app/EDuke32-iOS
          file Payload/EDuke32-iOS.app/EDuke32-iOS
          /usr/bin/zip -qry eDukeiOS-unsigned.ipa Payload

      - name: Package unsigned VoidSW IPA
        run: |
          mkdir -p VoidSWPayload/Payload
          cp -R platform/Apple/build/Debug-iphoneos/VoidSW-iOS.app VoidSWPayload/Payload/
          test -x VoidSWPayload/Payload/VoidSW-iOS.app/VoidSW-iOS
          file VoidSWPayload/Payload/VoidSW-iOS.app/VoidSW-iOS
          cd VoidSWPayload
          /usr/bin/zip -qry ../VoidSW-iOS-unsigned.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: eDukeiOS-unsigned-ipa
          path: eDukeiOS-unsigned.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Upload unsigned VoidSW IPA
        uses: actions/upload-artifact@v4
        with:
          name: VoidSW-iOS-unsigned-ipa
          path: VoidSW-iOS-unsigned.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Upload diagnostic symbols
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-symbols
          path: |
            platform/Apple/build/Debug-iphoneos/EDuke32-iOS.app.dSYM
            platform/Apple/build/Debug-iphoneos/EDuke32-iOS.app/EDuke32-iOS
            platform/Apple/build/Debug-iphoneos/VoidSW-iOS.app.dSYM
            platform/Apple/build/Debug-iphoneos/VoidSW-iOS.app/VoidSW-iOS
          if-no-files-found: warn
          retention-days: 14

      - name: Upload diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-log
          path: ios-build.log
          if-no-files-found: ignore
          retention-days: 3
