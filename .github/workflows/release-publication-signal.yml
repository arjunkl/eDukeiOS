name: Release publication signal

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize

permissions:
  contents: read

jobs:
  signal:
    name: Authorize trusted release publisher
    runs-on: ubuntu-latest
    steps:
      - name: Verify owner request
        env:
          REQUEST_ACTOR: ${{ github.actor }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          REQUEST_TITLE: ${{ github.event.pull_request.title }}
        run: |
          test "$REQUEST_ACTOR" = "$REPOSITORY_OWNER"
          test "$REQUEST_TITLE" = "Publish milestone IPA releases"
          echo "Owner-authorized release publication signal"
